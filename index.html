<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Grooves — Ecosistemas Creativos</title>
  <meta name="description" content="Grooves — Ecosistemas Creativos. Whitepaper v2.0">
  <meta name="theme-color" content="#111113">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23C8A96E'/><circle cx='16' cy='16' r='5' fill='%23111'/></svg>" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C8A96E;
      --gold-light: #d9bf8a;
      --gold-dim: #8a7548;
      --bg: #111113;
      --bg-sidebar: #0c0c0e;
      --bg-content: #16161a;
      --bg-card: #1e1e24;
      --border: #2a2a30;
      --text: #d4d4d8;
      --text-bright: #fafafa;
      --text-dim: #71717a;
      --sidebar-w: 280px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html { font-size: 16px; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ── Sidebar ─────────────────────────────────── */
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      z-index: 100;
      transition: transform 0.3s ease;
    }

    .sidebar-brand {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-brand a {
      color: var(--gold) !important;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 3px;
      text-decoration: none !important;
      border: none !important;
      display: block;
    }

    .sidebar-brand span {
      display: block;
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: 1px;
      margin-top: 4px;
      font-weight: 400;
    }

    .sidebar-nav { padding: 16px 0; }
    .sidebar-nav ul { list-style: none; padding: 0; margin: 0; }

    .sidebar-nav li a {
      display: block;
      padding: 10px 24px;
      color: var(--text-dim) !important;
      text-decoration: none !important;
      border: none !important;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      border-left: 3px solid transparent !important;
    }

    .sidebar-nav li a:hover {
      color: var(--text) !important;
      background: rgba(200, 169, 110, 0.05);
      border-left-color: var(--gold-dim) !important;
    }

    .sidebar-nav li.active > a {
      color: var(--gold) !important;
      background: rgba(200, 169, 110, 0.08);
      border-left-color: var(--gold) !important;
    }

    /* Sub-items in sidebar */
    .sidebar-nav li ul { padding-left: 12px; }
    .sidebar-nav li ul li a {
      font-size: 13px;
      padding: 6px 24px;
      color: var(--text-dim) !important;
    }

    /* ── Hamburger ────────────────────────────────── */
    .menu-toggle {
      display: none;
      position: fixed;
      top: 14px; left: 14px;
      z-index: 200;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      color: var(--gold);
      line-height: 0;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 90;
    }

    /* ── Main ─────────────────────────────────────── */
    .main {
      margin-left: var(--sidebar-w);
      min-height: 100vh;
      background: var(--bg-content);
    }

    .content {
      max-width: 780px;
      margin: 0 auto;
      padding: 48px 40px 80px;
    }

    /* ── Typography ───────────────────────────────── */
    .content h1 {
      color: var(--gold) !important;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      padding-bottom: 14px;
      border-bottom: 2px solid var(--gold-dim);
      letter-spacing: 0.5px;
    }

    .content h2 {
      color: var(--gold-light) !important;
      font-size: 20px;
      font-weight: 600;
      margin-top: 40px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .content h3 {
      color: var(--text-bright) !important;
      font-size: 16px;
      font-weight: 600;
      margin-top: 28px;
      margin-bottom: 12px;
    }

    .content p {
      margin-bottom: 16px;
      color: var(--text);
      text-align: justify;
    }

    .content strong { color: var(--text-bright) !important; }

    .content a {
      color: var(--gold) !important;
      text-decoration: none !important;
      border-bottom: 1px dotted var(--gold-dim) !important;
      transition: border-color 0.2s;
    }

    .content a:hover {
      border-bottom-style: solid !important;
      color: var(--gold-light) !important;
    }

    /* ── Lists ────────────────────────────────────── */
    .content ul, .content ol { margin: 12px 0 20px 20px; }
    .content li { margin: 8px 0; color: var(--text); text-align: justify; }
    .content li strong { color: var(--text-bright) !important; }

    /* ── Tables ───────────────────────────────────── */
    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 14px;
    }

    .content thead th {
      background: var(--bg-card) !important;
      color: var(--gold) !important;
      font-weight: 600;
      padding: 12px 16px;
      text-align: left;
      border: 1px solid var(--border);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .content tbody td {
      padding: 10px 16px;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .content tbody tr:nth-child(odd) { background: #16161a; }
    .content tbody tr:nth-child(even) { background: #1a1a20; }
    .content tbody tr:hover { background: var(--bg-card); }

    /* ── Blockquotes ──────────────────────────────── */
    .content blockquote {
      border-left: 4px solid var(--gold) !important;
      background: var(--bg-card);
      padding: 16px 20px;
      margin: 20px 0;
      border-radius: 0 8px 8px 0;
    }

    .content blockquote p {
      color: var(--text) !important;
      margin-bottom: 0;
      text-align: justify;
    }

    /* ── Alert Boxes ──────────────────────────────── */
    .alert {
      border-radius: 8px !important;
      padding: 18px 22px !important;
      margin: 24px 0 !important;
      border-left: 4px solid !important;
      border-top: none !important;
      border-right: none !important;
      border-bottom: none !important;
    }

    .alert.callout.note {
      background: #1a1d2e !important;
      border-left-color: #4a6fa5 !important;
    }

    .alert.callout.tip {
      background: #1a2e1a !important;
      border-left-color: #4a8c5c !important;
    }

    .alert.callout.warning {
      background: #2e2a1a !important;
      border-left-color: var(--gold) !important;
    }

    .alert .title {
      font-weight: 600 !important;
      margin-bottom: 6px;
      color: var(--text-bright) !important;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .alert p { color: var(--text) !important; text-align: justify; }

    /* Docsify built-in tip/warn */
    p.tip {
      background: #1a2e1a !important;
      border-left: 4px solid #4a8c5c !important;
      padding: 16px 20px !important;
      border-radius: 0 8px 8px 0 !important;
      color: var(--text) !important;
    }

    p.warn {
      background: #2e2a1a !important;
      border-left: 4px solid var(--gold) !important;
      padding: 16px 20px !important;
      border-radius: 0 8px 8px 0 !important;
      color: var(--text) !important;
    }

    /* ── HR ────────────────────────────────────────── */
    .content hr {
      border: none !important;
      border-top: 1px solid var(--border) !important;
      margin: 32px 0;
    }

    /* ── Code ──────────────────────────────────────── */
    .content code {
      background: var(--bg-card) !important;
      color: var(--gold) !important;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 13px;
    }

    .content pre {
      background: var(--bg-card) !important;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
    }

    .content pre code {
      background: transparent !important;
      padding: 0;
    }

    /* ── Pagination ────────────────────────────────── */
    .docsify-pagination-container {
      display: flex !important;
      justify-content: space-between;
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      gap: 16px;
    }

    .pagination-item {
      flex: 1;
      max-width: 50%;
    }

    .pagination-item a {
      display: block;
      padding: 16px 20px;
      background: var(--bg-card) !important;
      border: 1px solid var(--border) !important;
      border-radius: 8px;
      text-decoration: none !important;
      transition: border-color 0.2s;
    }

    .pagination-item a:hover {
      border-color: var(--gold-dim) !important;
    }

    .pagination-item-label {
      font-size: 11px !important;
      color: var(--text-dim) !important;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
      display: block;
    }

    .pagination-item-title {
      font-size: 14px !important;
      font-weight: 600 !important;
      color: var(--gold) !important;
      display: block;
    }

    /* HIDE the description/subtitle in pagination */
    .pagination-item-subtitle,
    .pagination-item a .pagination-item-label ~ *:not(.pagination-item-title) {
      display: none !important;
    }

    .pagination-item--next { text-align: right; }
    .pagination-item--next a { text-align: right; }

    /* ── Search ────────────────────────────────────── */
    .search {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .search input {
      width: 100%;
      background: var(--bg-card) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: var(--font);
      outline: none;
    }

    .search input:focus { border-color: var(--gold-dim) !important; }
    .search input::placeholder { color: var(--text-dim); }

    .search .results-panel {
      background: var(--bg-sidebar) !important;
    }

    .search .matching-post {
      background: var(--bg-card) !important;
      border-bottom: 1px solid var(--border) !important;
      padding: 10px 14px;
    }

    .search .matching-post a { color: var(--gold) !important; }
    .search .matching-post p { color: var(--text-dim) !important; font-size: 13px; }

    .search a:hover { color: var(--gold-light) !important; }

    /* ── Scrollbar ─────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

    .sidebar::-webkit-scrollbar { width: 3px; }

    /* ── Mobile ────────────────────────────────────── */
    @media (max-width: 860px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); box-shadow: 4px 0 20px rgba(0,0,0,0.5); }
      .menu-toggle { display: block; }
      .overlay.open { display: block; }
      .main { margin-left: 0; }

      .content {
        padding: 60px 18px 80px;
      }

      .content h1 { font-size: 22px; }
      .content h2 { font-size: 17px; margin-top: 30px; }
      .content h3 { font-size: 15px; }
      .content p, .content li { font-size: 15px; }

      /* Tables scroll horizontally on mobile */
      .content table {
        display: block;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        white-space: nowrap;
        font-size: 13px;
      }

      .content thead th,
      .content tbody td {
        padding: 8px 12px;
      }

      /* Pagination stacks vertically on mobile */
      .docsify-pagination-container {
        flex-direction: column;
      }

      .pagination-item {
        max-width: 100%;
      }

      /* Alerts smaller padding on mobile */
      .alert {
        padding: 14px 16px !important;
      }

      .content blockquote {
        padding: 12px 16px;
        margin: 16px 0;
      }
    }

    /* ── Hide Docsify defaults we don't need ──────── */
    body > nav,
    .github-corner,
    .docsify-darklight-theme-toggle,
    .app-nav { display: none !important; }

    /* Fix docsify overrides */
    section.content { background: var(--bg-content) !important; }
    .markdown-section { max-width: 780px !important; }
    #main { background: var(--bg-content) !important; }
  </style>
</head>
<body>

  <!-- Hamburger (mobile only) -->
  <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Menu">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="5" x2="17" y2="5"/>
      <line x1="3" y1="10" x2="17" y2="10"/>
      <line x1="3" y1="15" x2="17" y2="15"/>
    </svg>
  </button>

  <!-- Overlay (mobile sidebar background) -->
  <div class="overlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <a href="#/">GROOVES</a>
      <span>Ecosistemas Creativos</span>
    </div>
    <div class="search" id="search-container"></div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="content" id="main"></div>
  </main>

  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.querySelector('.overlay').classList.toggle('open');
    }
    document.addEventListener('click', function(e) {
      if (e.target.closest('.sidebar-nav a') && window.innerWidth <= 860) {
        document.getElementById('sidebar').classList.remove('open');
        document.querySelector('.overlay').classList.remove('open');
      }
    });
  </script>

  <script>
    window.$docsify = {
      el: '#main',
      name: 'GROOVES',
      repo: false,
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      noEmoji: true,
      routerMode: 'hash',
      search: {
        placeholder: 'Buscar...',
        noData: 'Sin resultados',
        depth: 3,
      },
      pagination: {
        previousText: 'ANTERIOR',
        nextText: 'SIGUIENTE',
        crossChapter: true,
        crossChapterText: true,
      },
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-plugin-flexible-alerts@1/dist/docsify-plugin-flexible-alerts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

</body>
</html>
